name: refresh-events
on:
  schedule:
    - cron: '0 1 * * 1,4'   # Mon & Thu 01:00 UTC (~9am KL)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node fetch_events.js
      - name: commit if changed
        run: |
          git config user.name "cf-events-bot"
          git config user.email "cf-events-bot@users.noreply.github.com"
          git add events.js
          git diff --staged --quiet || (git commit -m "chore: auto-refresh KL events" && git push)
